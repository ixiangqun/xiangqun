ign-items:center;font-family:var(--mono);font-size:17px;font-weight:800;letter-spacing:-0.5px;line-height:1}\\n.dm2wx-logo::before{content:'[';color:var(--ink-faint);font-size:13px;font-weight:400;margin-right:2px}\\n.dm2wx-logo::after{content:']';color:var(--ink-faint);font-size:13px;font-weight:400;margin-left:2px}\\n.dm2wx-logo .dm{color:var(--brand);text-shadow:0 0 14px rgba(0,200,255,0.6)}\\n.dm2wx-logo .sep{color:var(--ink-faint);font-size:13px;font-weight:400;margin:0 1px}\\n.dm2wx-logo .wx{color:var(--brand-2);text-shadow:0 0 14px rgba(123,95,255,0.6)}\\n.topbar .divider{width:1px;height:22px;background:var(--panel-border)}\\n.topbar .spacer{flex:1}\\n.topbar .meta{color:var(--ink-faint);font-size:11px;font-variant-numeric:tabular-nums;font-family:var(--mono)}\\n.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:5px;border:1px solid var(--panel-border);background:rgba(255,255,255,0.03);color:var(--ink-soft);font-size:12px;font-family:var(--ui);cursor:pointer;transition:all 0.15s ease;white-space:nowrap}\\n.btn:hover{border-color:var(--brand);color:var(--brand);background:rgba(0,200,255,0.06);box-shadow:var(--glow-sm)}\\n.btn:active{transform:translateY(1px)}\\n.btn.primary{background:linear-gradient(135deg,rgba(0,200,255,0.12),rgba(123,95,255,0.12));color:var(--brand);border-color:rgba(0,200,255,0.5);font-weight:600}\\n.btn.primary:hover{background:linear-gradient(135deg,rgba(0,200,255,0.22),rgba(123,95,255,0.22));box-shadow:var(--glow)}\\n.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-faint)}\\n.btn.ghost:hover{background:rgba(0,200,255,0.04);border-color:var(--panel-border);color:var(--brand)}\\n.btn .ico{width:13px;height:13px;flex-shrink:0}\\n.select-theme{display:flex;align-items:center;gap:8px;padding:4px 6px 4px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);border-radius:5px;font-size:12px}\\n.select-theme select{border:none;background:transparent;font-family:var(--ui);font-size:12px;color:var(--ink-soft);padding:4px;outline:none;cursor:pointer}\\n.select-theme select option{background:#0D1220}\\n.main{display:grid;grid-template-columns:300px 5px 1fr 340px;min-height:0}\\n\\n.pane{min-height:0;display:flex;flex-direction:column;background:var(--panel-bg)}\\n.pane+.pane{border-left:1px solid var(--panel-border)}\\n.pane-head{padding:0 16px;height:40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--panel-border);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-faint);font-weight:600;flex-shrink:0;font-family:var(--mono);background:rgba(0,0,0,0.25)}.pane.collapsed .pane-head{height:100%;border-bottom:none;border-right:1px solid var(--panel-border);}\\n.pane-head .actions{display:flex;gap:6px}\\n.pane-body{flex:1;overflow:auto;min-height:0}\\n#editor{width:100%;height:100%;border:none;outline:none;padding:20px 22px 80px;font-family:var(--mono);font-size:13px;line-height:1.8;color:#B8CCE8;background:var(--panel-bg);resize:none;tab-size:2;caret-color:var(--brand)}\\n#editor::placeholder{color:var(--ink-faint)}\\n#editor:focus{background:#080D1A}\\n.preview-pane{background:#060A12}\\n.preview-wrap{padding:22px 0 40px;display:flex;justify-content:center}\\n.preview-frame{width:375px;min-height:500px;background:white;border-radius:14px;box-shadow:0 0 0 1px rgba(0,200,255,0.12),0 0 40px rgba(0,200,255,0.06),0 20px 60px rgba(0,0,0,0.7);overflow:hidden}\\n.preview-phone-bar{height:34px;background:#F7F4EE;border-bottom:1px solid #ECE6D8;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;color:#666;font-variant-numeric:tabular-nums}\\n.preview-phone-bar .dots{display:flex;gap:4px}\\n.preview-phone-bar .dots span{width:5px;height:5px;border-radius:50%;background:#aaa;opacity:0.5}\\n.preview-article-meta{padding:18px 20px 14px;border-bottom:1px solid #F0ECE3;background:white}\\n.preview-article-meta .title-fake{font-size:18px;font-weight:700;color:#222;margin-bottom:8px;line-height:1.4}\\n.preview-article-meta .byline{font-size:12px;color:#8A8A8A;display:flex;gap:8px;align-items:center}\\n.preview-article-meta .byline .acct{color:#576B95}\\n#preview-content{padding:16px 16px 40px;font-size:16px;background:white}\\n#preview-content>*:first-child{margin-top:0!important}\\n.settings-pane{background:var(--panel-bg)}\\n.settings-body{padding:0 0 60px}\\n.accordion-item{border-bottom:1px solid var(--hair)}\\n.accordion-head{width:100%;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink-soft);cursor:pointer;text-align:left;text-transform:uppercase;letter-spacing:1px}\\n.accordion-head:hover{background:rgba(0,200,255,0.04);color:var(--brand)}\\n.accordion-head .chevron{transition:transform 0.2s ease;color:var(--ink-faint)}\\n.accordion-item.open .chevron{transform:rotate(90deg)}\\n.accordion-body{display:none;padding:4px 16px 16px}\\n.accordion-item.open .accordion-body{display:block}\\n.field{margin-bottom:14px}\\n.field:last-child{margin-bottom:4px}\\n.field-label{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;font-family:var(--mono)}\\n.field-label .val{font-size:10px;color:var(--ink-faint);font-family:var(--mono)}\\n.field-row{display:flex;align-items:center;gap:8px}\\n.field-row .seg{flex:1}\\n.seg{display:flex;background:rgba(0,0,0,0.3);border-radius:5px;padding:2px;gap:2px;border:1px solid var(--panel-border)}\\n.seg button{flex:1;padding:5px 8px;border:none;background:transparent;border-radius:3px;font-size:11px;font-family:var(--ui);cursor:pointer;color:var(--ink-faint);transition:all 0.1s}\\n.seg button.active{background:rgba(0,200,255,0.12);color:var(--brand);font-weight:600}\\ninput[type=\\\"range\\\"]{-webkit-appearance:none;appearance:none;width:100%;height:3px;bac evice-bar\\\">\\n                \\u003Cdiv class=\\\"dot\\\">\\u003C/div>\\u003Cdiv class=\\\"dot\\\">\\u003C/div>\\u003Cdiv class=\\\"dot\\\">\\u003C/div>\\n                \\u003Cdiv class=\\\"url-bar\\\">mp.weixin.qq.com\\u003C/div>\\n                \\u003Cdiv style=\\\"width:54px\\\">\\u003C/div>\\n              \\u003C/div>\\n              \\u003Cdiv class=\\\"preview-phone-bar\\\">\\n                \\u003Cspan>9:41\\u003C/span>\\n                \\u003Cspan class=\\\"dots\\\">\\u003Cspan>\\u003C/span>\\u003Cspan>\\u003C/span>\\u003Cspan>\\u003C/span>\\u003C/span>\\n                \\u003Cspan>100%\\u003C/span>\\n              \\u003C/div>\\n              \\u003Cdiv class=\\\"preview-article-meta\\\">\\n                \\u003Cdiv class=\\\"title-fake\\\">文章标题（公众号会自动加上）\\u003C/div>\\n                \\u003Cdiv class=\\\"byline\\\">\\u003Cspan class=\\\"acct\\\">公众号名称\\u003C/span>\\u003Cspan>·\\u003C/span>\\u003Cspan>刚刚\\u003C/span>\\u003C/div>\\n              \\u003C/div>\\n              \\u003Cdiv id=\\\"preview-content\\\">\\u003C/div>\\n            \\u003C/div>\\n          \\u003C/div>\\n        \\u003C/div>\\n      \\u003C/section>\\n\\n      \\u003C!-- 右：样式面板 -->\\n      \\u003Csection class=\\\"pane settings-pane\\\">\\n        \\u003Cdiv class=\\\"pane-head\\\" id=\\\"settings-pane-head\\\">\\n          \\u003Cbutton class=\\\"collapse-btn\\\" id=\\\"btn-collapse-settings\\\" title=\\\"折叠样式面板\\\">\\n            \\u003Csvg viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2\\\">\\u003Cpolyline points=\\\"9 18 15 12 9 6\\\">\\u003C/polyline>\\u003C/svg>\\n          \\u003C/button>\\n          \\u003Cspan class=\\\"pane-title-text\\\">样式调节\\u003C/span>\\n          \\u003Cspan class=\\\"actions\\\">\\n            \\u003Cspan style=\\\"text-transform:none; letter-spacing:0; color:var(--ink-faint); font-weight:400; font-size:11px;\\\">实时生效\\u003C/span>\\n          \\u003C/span>\\n        \\u003C/div>\\n        \\u003Cdiv class=\\\"pane-body\\\">\\n          \\u003Cdiv id=\\\"settings-body\\\" class=\\\"settings-body\\\">\\u003C/div>\\n        \\u003C/div>\\n      \\u003C/section>\\n    \\u003C/main>\\n  \\u003C/div>\\n\\n  \\u003C!-- 隐藏文件选择器 -->\\n  \\u003Cinput type=\\\"file\\\" id=\\\"import-file\\\" accept=\\\"application/json\\\" style=\\\"display:none\\\">\\n\\n  \\u003C!-- Toast -->\\n  \\u003Cdiv id=\\\"toast\\\" class=\\\"toast\\\">提示\\u003C/div>\\n\\n  \\u003Cscript src=\\\"7154480f-e386-4866-93c1-e27a12e7cd1a\\\">\\u003C/script>\\n  \\u003Cscript src=\\\"4e7eaada-218b-41b1-97cf-a7817c311649\\\">\\u003C/script>\\n  \\u003Cscript src=\\\"ec75f08d-b3bf-4f3b-bd8d-9585009305f6\\\">\\u003C/script>\\n\\n\\n\\n\\u003Cscript>\\n(function(){\\n  // Collapse editor\\n  var editorPane = document.querySelector('.main .pane:first-child');\\n  var settingsPane = document.querySelector('.settings-pane');\\n  var mainEl = document.querySelector('.main');\\n\\n  var userHasDragged = localStorage.getItem('dm2wx-resized') === '1';\\n  var editorWidth = userHasDragged ? parseInt(localStorage.getItem('dm2wx-editor-w') || '0') : 0;\\n\\n  function updateGrid(){\\n    var ec = editorPane.classList.contains('collapsed');\\n    var sc = settingsPane.classList.contains('collapsed');\\n    var left = ec ? '40px' : editorWidth + 'px';\\n    var right = sc ? '40px' : '340px';\\n    mainEl.style.gridTemplateColumns = left + ' 5px 1fr ' + right;\\n  }\\n\\n  document.getElementById('btn-collapse-editor').addEventListener('click', function(e){\\n    e.stopPropagation();\\n    editorPane.classList.toggle('collapsed');\\n    updateGrid();\\n  });\\n  document.getElementById('editor-pane-head').addEventListener('click', function(){\\n    if(editorPane.classList.contains('collapsed')){\\n      editorPane.classList.remove('collapsed');\\n      updateGrid();\\n    }\\n  });\\n\\n  document.getElementById('btn-collapse-settings').addEventListener('click', function(e){\\n    e.stopPropagation();\\n    settingsPane.classList.toggle('collapsed');\\n    // arrow: → when expanded, ← when collapsed (rotate 180 when collapsed)\\n    document.getElementById('btn-collapse-settings').style.transform = settingsPane.classList.contains('collapsed') ? 'rotate(180deg)' : '';\\n    updateGrid();\\n  });\\n  document.getElementById('settings-pane-head').addEventListener('click', function(){\\n    if(settingsPane.classList.contains('collapsed')){\\n      settingsPane.classList.remove('collapsed');\\n      document.getElementById('btn-collapse-settings').style.transform = '';\\n      updateGrid();\\n    }\\n  });\\n\\n  // Device switcher\\n  var previewPane = document.getElementById('preview-pane');\\n  var labelEl = document.getElementById('preview-mode-label');\\n  var deviceBtns = document.querySelectorAll('.device-btn');\\n  var devices = {\\n    'dev-phone':   { key:'phone',   label:'手机预览 · 375px' },\\n    'dev-ipad':    { key:'ipad',    label:'iPad 预览 · 768px' },\\n    'dev-desktop': { key:'desktop', label:'电脑预览' }\\n  };\\n  deviceBtns.forEach(function(btn){\\n    btn.addEventListener('click', function(){\\n      deviceBtns.forEach(function(b){ b.classList.remove('active'); });\\n      btn.classList.add('active');\\n      var d = devices[btn.id];\\n      previewPane.setAttribute('data-device', d.key);\\n      labelEl.textContent = d.label;\\n    });\\n  });\\n\\n  // Default: settings collapsed\\n  settingsPane.classList.add('collapsed');\\n  document.getElementById('btn-collapse-settings').style.transform = 'rotate(180deg)';\\n  if (!editorWidth) {\\n    // Set temp equal split, then fix after layout settles\\n    mainEl.style.gridTemplateColumns = '1fr 5px 1fr 40px';\\n    setTimeout(function(){\\n      var rect = mainEl.getBoundingClientRect();\\n      editorWidth = Math.floor((rect.width - 5 - 40) / 2);\\n      updateGrid();\\n    }, 50);\\n  } else {\\n    updateGrid();\\n  }\\n\\n  // Resizer drag\\n  var resizer = document.getElementById('resizer');\\n  var isDragging = false;\\n  var startX, startW;\\n\\n  resizer.addEventListener('mousedown', function(e){\\n    isDragging = true;\\n    startX = e.clientX;\\n    startW = editorWidth;\\n    resizer.classList.add('dragging');\\n    document.body.style.cursor = 'col-resize';\\n    document.body.style.userSelect = 'none';\\n    e.preventDefault();\\n  });\\n\\n  document.addEventListener('mousemove', function(e){\\n    if (!isDragging) return;\\n    var dx = e.clientX - startX;\\n    editorWidth = Math.max(180, Math.min(700, startW + dx));\\n    localStorage.setItem('dm2wx-editor-w', editorWidth);\\n    localStorage.setItem('dm2wx-resized', '1');\\n    updateGrid();\\n  });\\n\\n  document.addEventListener('mouseup', function(){\\n    if (!isDragging) return;\\n    isDragging = false;\\n    resizer.classList.remove('dragging');\\n    document.body.style.cursor = '';\\n    document.body.style.userSelect = '';\\n  });\\n})();\\n\\u003C/script>\\n\\u003C/body>\\u003C/html>\"\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
