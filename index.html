document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  justify-content: center;\n    gap: 0;\n    background: transparent;\n    padding-top: clamp(48px, 7vh, 80px);\n  }\n\n  .center-wrap {\n    position: relative;\n    z-index: 30;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n  }\n\n  #globe {\n    position: relative;\n    z-index: 2;\n  }\n\n  /* Theme toggle — 右上角，导航条右侧 */\n  .theme-toggle {\n    position: fixed;\n    top: clamp(10px, 1.8vh, 22px);\n    right: clamp(14px, 2.5vw, 32px);\n    width: 40px; height: 22px;\n    background: none;\n    border: 1.5px solid var(--accent);\n    border-radius: 11px;\n    cursor: pointer;\n    padding: 3px;\n    transition: border-color 0.4s;\n    z-index: 60;\n  }\n  .theme-toggle::after {\n    content: '';\n    display: block;\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    background: var(--accent);\n    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;\n  }\n  :root.dark .theme-toggle::after { transform: translateX(18px); }\n\n  .scene {\n    position: relative;\n    flex-shrink: 0;\n    z-index: 2;\n  }\n\n  canvas { display: block; }\n\n  #whirl {\n    position: absolute;\n    width: 170%; height: 170%;\n    top: -35%; left: -35%;\n    pointer-events: none;\n    overflow: visible;\n  }\n\n  .scene {\n    overflow: visible !important;\n    cursor: pointer;\n  }\n\n  .brand {\n    text-align: center;\n    animation: fadeUp 2s cubic-bezier(0.16,1,0.3,1) 0.6s both;\n    margin-top: 4vh;\n    position: relative;\n    z-index: 2;\n  }\n\n  .brand-name {\n    font-family: 'EB Garamond', Georgia, serif;\n    font-weight: 400;\n    letter-spacing: 0.32em;\n    color: var(--text);\n    line-height: 1;\n    text-transform: uppercase;\n    font-size: clamp(22px, 3.2vmin, 52px);\n    transition: color 0.7s ease;\n    text-shadow: 0 2px 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.3);\n  }\n\n  body.day-mode .brand-name {\n    color: #e8f2ff;\n    text-shadow: 0 0 30px rgba(255,220,100,0.15), 0 2px 20px rgba(0,0,0,0.9);\n  }\n\n  body.day-mode .brand-tagline {\n    color: #acd4f8;\n  }\n\n  body.day-mode .brand-line span { background: #6cb4f0; }\n  body.day-mode .brand-line i    { background: #6cb4f0; }\n\n  .brand-line {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 12px;\n    margin-top: 14px;\n    opacity: var(--line-op);\n    transition: opacity 0.7s ease;\n  }\n\n  .brand-line span {\n    display: block;\n    height: 1px;\n    width: clamp(30px, 5vmin, 60px);\n    background: var(--accent);\n    transition: background 0.7s ease;\n  }\n\n  .brand-line i {\n    display: block;\n    width: 5px; height: 5px;\n    border-radius: 50%;\n    background: var(--accent);\n    animation: pulse 2.4s ease-in-out infinite;\n    font-style: normal;\n    transition: background 0.7s ease;\n  }\n\n  .brand-tagline {\n    font-family: 'EB Garamond', Georgia, serif;\n    font-style: italic;\n    font-size: clamp(13px, 1.7vmin, 22px);\n    letter-spacing: 0.14em;\n    color: var(--accent);\n    margin-top: 16px;\n    opacity: 0.75;\n    white-space: nowrap;\n    animation: fadeUp 2.4s cubic-bezier(0.16,1,0.3,1) 1.1s both;\n    transition: color 0.7s ease;\n  }\n\n  /* ── Navigation ── */\n  .nav {\n    display: flex;\n    gap: clamp(18px, 3.5vw, 52px);\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    z-index: 50;\n    padding: clamp(14px, 2.2vh, 24px) clamp(28px, 5vw, 72px);\n    justify-content: center;\n    animation: fadeUp 2s cubic-bezier(0.16,1,0.3,1) 0.8s both;\n    background: linear-gradient(to bottom, rgba(0,3,12,0.72) 0%, rgba(0,3,12,0) 100%);\n    backdrop-filter: blur(0px);\n  }\n\n  .nav-item {\n    position: relative;\n  }\n\n  .nav-btn {\n    background: none;\n    border: none;\n    cursor: pointer;\n    padding: 6px 2px;\n    font-family: 'EB Garamond', Georgia, serif;\n    font-size: clamp(12px, 1.55vmin, 18px);\n    letter-spacing: 0.16em;\n    color: rgba(220, 235, 255, 0.65);\n    transition: color 0.3s ease;\n    display: flex;\n    align-items: center;\n    gap: 5px;\n    white-space: nowrap;\n  }\n\n  .nav-btn::after {\n    content: '';\n    display: block;\n    width: 4px; height: 4px;\n    border-right: 1px solid currentColor;\n    border-bottom: 1px solid currentColor;\n    transform: rotate(45deg) translateY(-2px);\n    transition: transform 0.3s ease;\n    opacity: 0.6;\n    flex-shrink: 0;\n  }\n\n  .nav-item.open .nav-btn::after {\n    transform: rotate(-135deg) translateY(-2px);\n  }\n\n  .nav-btn:hover,\n  .nav-item.open .nav-btn {\n    color: rgba(180, 220, 255, 1);\n  }\n\n  /* Underline on hover */\n  .nav-btn span {\n    position: relative;\n  }\n  .nav-btn span::after {\n    content: '';\n    position: absolute;\n    left: 0; right: 0; bottom: -2px;\n    height: 1px;\n    background: currentColor;\n    transform: scaleX(0);\n    transform-origin: left;\n    transition: transform 0.3s ease;\n    opacity: 0.5;\n  }\n  .nav-btn:hover span::after,\n  .nav-item.open .nav-btn span::after {\n    transform: scaleX(1);\n  }\n\n  /* Submenu */\n  .nav-sub {\n    position: absolute;\n    top: calc(100% + 10px);\n    left: 50%;\n    background: rgba(3, 8, 22, 0.88);\n    backdrop-filter: blur(16px);\n    -webkit-backdrop-filter: blur(16px);\n    border: 1px solid rgba(100, 160, 255, 0.13);\n    border-radius: 2px;\n    padding: 10px 0;\n    min-width: 148px;\n    opacity: 0;\n    pointer-events: none;\n    transform: translateX(-50%) translateY(6px);\n    transition: opacity 0.28s ease, transform 0.28s ease;\n    z-index: 60;\n  }\n\n  .nav-item.open .nav-sub {\n    opacity: 1;\n    pointer-events: all;\n    transform: translateX(-50%) translateY(0);\n  }\n\n  .nav-sub a {\n    display: block;\n    padding: 8px 20px;\n    font-family: 'EB Garamond', Georgia, serif;\n    font-size: clamp(11px, 1.35vmin, 15px);\n    letter-spacing: 0.10em;\n    color: rgba(180, 215, 255, 0.7);\n    text-decoration: none;\n    transition: color 0.2s, background 0.2s;\n    white-space: nowrap;\n  }\n\n  .nav-sub a:hover {\n    color: rgba(220, 240, 255, 1);\n    background: rgba(80, 140, 255, 0.08);\n  }\n\n  /* Connector dot */\n  .nav-sub::before {\n    content: '';\n    position: absolute;\n    top: -5px; left: 50%;\n    transform: translateX(-50%) rotate(45deg);\n    width: 8px; height: 8px;\n    background: rgba(5, 12, 30, 0.9);\n    border-left: 1px solid rgba(100, 160, 255, 0.15);\n    border-top:  1px solid rgba(100, 160, 255, 0.15);\n  }\n\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(16px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes pulse {\n    0%, 100% { opacity: 0.4; transform: scale(1); }\n    50%       { opacity: 1;   transform: scale(1.6); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<canvas id=\"galaxy\"><\u002Fcanvas>\n<!-- light-mode frosted overlay -->\n<div id=\"bgOverlay\" style=\"position:fixed;inset:0;z-index:0;transition:background 0.9s ease;\"><\u002Fdiv>\n<button class=\"theme-toggle\" id=\"themeBtn\" title=\"切换主题\" aria-label=\"切换明暗主题\"><\u002Fbutton>\n\n<div class=\"center-wrap\">\n<div class=\"scene\" id=\"scene\">\n  <canvas id=\"globe\"><\u002Fcanvas>\n  <svg id=\"whirl\" viewBox=\"-100 -100 400 400\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fsvg>\n<\u002Fdiv>\n\n<div class=\"brand\">\n  <div class=\"brand-name\">Xiangqun<\u002Fdiv>\n  <div class=\"brand-line\">\n    <span><\u002Fspan>\n    <i><\u002Fi>\n    <span><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"brand-tagline\">Evolve Everything with AI.<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv><!-- /center-wrap -->\n\n<nav class=\"nav\" id=\"mainNav\">\n  <div class=\"nav-item\" data-key=\"strategy\">\n    <button class=\"nav-btn\"><span>AI 战略<\u002Fspan><\u002Fbutton>\n    <div class=\"nav-sub\">\n      <a href=\"#\">企业 AI 战略咨询<\u002Fa>\n      <a href=\"#\">AI 转型路线图<\u002Fa>\n      <a href=\"#\">竞争格局分析<\u002Fa>\n      <a href=\"#\">AI 治理框架<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nav-item\" data-key=\"invest\">\n    <button class=\"nav-btn\"><span>AI 投资<\u002Fspan><\u002Fbutton>\n    <div class=\"nav-sub\">\n      <a href=\"#\">前沿项目追踪<\u002Fa>\n      <a href=\"#\">投资逻辑分析<\u002Fa>\n      <a href=\"#\">赛道研究报告<\u002Fa>\n      <a href=\"#\">创始人访谈<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nav-item\" data-key=\"apps\">\n    <button class=\"nav-btn\"><span>AI 应用<\u002Fspan><\u002Fbutton>\n    <div class=\"nav-sub\">\n      <a href=\"#\">行业落地案例<\u002Fa>\n      <a href=\"#\">产品评测<\u002Fa>\n      <a href=\"#\">实战教程<\u002Fa>\n      <a href=\"#\">效率提升指南<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nav-item\" data-key=\"tools\">\n    <button class=\"nav-btn\"><span>AI 工具箱<\u002Fspan><\u002Fbutton>\n    <div class=\"nav-sub\">\n      <a href=\"DM2WX/DM2WX.html\">公众号排版<\u002Fa>\n      <a href=\"#\">精选工具导航<\u002Fa>\n      <a href=\"#\">提示词库<\u002Fa>\n      <a href=\"#\">API 速查<\u002Fa>\n      <a href=\"#\">开源资源<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n\n<script>\n// ── Responsive sizing ──────────────────────────────────────────\nconst GLOBE_FRACTION = 0.42; // slightly smaller to leave room for nav + brand\n\nlet W, H, R, scene, canvas, ctx;\n\nfunction resize() {\n  const vmin = Math.min(window.innerWidth, window.innerHeight);\n  const size = Math.round(vmin * GLOBE_FRACTION);\n  W = H = size;\n  R = size * 0.39;\n\n  scene = document.getElementById('scene');\n  scene.style.width  = size + 'px';\n  scene.style.height = size + 'px';\n\n  canvas = document.getElementById('globe');\n  canvas.width  = size;\n  canvas.height = size;\n  canvas.style.width  = size + 'px';\n  canvas.style.height = size + 'px';\n  ctx = canvas.getContext('2d');\n}\n\nresize();\nwindow.addEventListener('resize', () => { resize(); buildWhirl(); });\n\nconst whirlSvg = document.getElementById('whirl');\n\n\n\n// ── Whirl ──────────────────────────────────────────────────────\nfunction buildWhirl() {\n  whirlSvg.innerHTML = '';\n  const ns = 'http://www.w3.org/2000/svg';\n  const cx = 100, cy = 100;\n  const numArcs = 7;\n  const rStart = 90, rStep = 9; // clearly outside globe (~78 units radius)\n\n  for (let i = 0; i < numArcs; i++) {\n    const phase = (i / numArcs) * Math.PI * 2;\n    const r0 = rStart + i * rStep;  // 90 → 144\n    const strokeW = 2.2 - i * 0.2;\n    const opacity = 0.58 - i * 0.058;\n\n    const arc = document.createElementNS(ns, 'path');\n    arc.setAttribute('fill', 'none');\n    arc.setAttribute('stroke', getThemeColors().whirl);\n    arc.setAttribute('stroke-width', strokeW);\n    arc.setAttribute('stroke-opacity', opacity);\n    arc.setAttribute('stroke-linecap', 'round');\n\n    const sweep = Math.PI * 1.35;\n    const x1 = cx + r0 * Math.cos(phase);\n    const y1 = cy + r0 * Math.sin(phase);\n    const x2 = cx + r0 * Math.cos(phase + sweep);\n    const y2 = cy + r0 * Math.sin(phase + sweep);\n    arc.setAttribute('d', `M ${x1} ${y1} A ${r0} ${r0} 0 1 1 ${x2} ${y2}`);\n\n    const circ = 2 * Math.PI * r0;\n    arc.setAttribute('stroke-dasharray', `${circ * 0.42} ${circ}`);\n\n    const dur   = 3.0 + i * 0.35;\n    const delay = -i * (dur / numArcs);\n    arc.style.transformOrigin = `${cx}px ${cy}px`;\n    arc.style.animation = `spinW ${dur}s linear ${delay}s infinite`;\n\n    whirlSvg.appendChild(arc);\n  }\n\n  const style = document.createElementNS(ns, 'style');\n  style.textContent = `\n    @keyframes spinW {\n      from { transform: rotate(0deg); }\n      to   { transform: rotate(360deg); }\n    }\n  `;\n  whirlSvg.appendChild(style);\n}\n\n// ── Theme ─────────────────────────────────────────────────────\nconst root = document.documentElement;\nconst themeBtn = document.getElementById('themeBtn');\nlet isDark = false;\n\n// Respect system preference on load\nif (window.matchMedia('(prefers-color-scheme: dark)').matches) {\n  isDark = true; root.classList.add('dark');\n} else {\n  isDark = false; root.classList.remove('dark');\n}\n\nthemeBtn.addEventListener('click', () => {\n  isDark = !isDark;\n  root.classList.toggle('dark', isDark);\n  buildWhirl();\n  drawGlobe(rotation);\n  updateOverlay();\n});\n\nfunction getThemeColors() {\n  return isDark ? {\n    oceanDeep:  '#0d3580',\n    oceanMid:   '#1a6ed4',\n    oceanLight: '#3a99f0',\n    land:       '#1a3d28',\n    landSheen:  'rgba(50,110,60,0.22)',\n    border:     'rgba(180,220,255,0.18)',\n    graticule:  'rgba(180,220,255,0.08)',\n    sphere:     'rgba(100,180,255,0.20)',\n    specHi:     'rgba(160,210,255,0.18)',\n    specShadow: 'rgba(0,5,30,0.30)',\n    whirl:      '#4f8fd4',\n  } : {\n    oceanDeep:  '#134d96',\n    oceanMid:   '#2068c4',\n    oceanLight: '#4f97e0',\n    land:       '#1a3325',\n    landSheen:  'rgba(70,140,80,0.20)',\n    border:     'rgba(255,255,255,0.22)',\n    graticule:  'rgba(255,255,255,0.10)',\n    sphere:     'rgba(255,255,255,0.25)',\n    specHi:     'rgba(255,255,255,0.20)',\n    specShadow: 'rgba(0,15,50,0.18)',\n    whirl:      '#2e72cc',\n  };\n}\nlet rotation = 0;\n\nfunction drawGlobe(rot) {\n  const c = getThemeColors();\n  ctx.clearRect(0, 0, W, H);\n\n  const proj = d3.geoOrthographic()\n    .scale(R)\n    .translate([W/2, H/2])\n    .rotate([rot, -22, 0])\n    .clipAngle(90);\n\n  const path = d3.geoPath(proj, ctx);\n  const grat = d3.geoGraticule()();\n\n  // Ocean\n  const og = ctx.createRadialGradient(W/2-R*0.28, H/2-R*0.28, R*0.08, W/2, H/2, R);\n  og.addColorStop(0, c.oceanLight);\n  og.addColorStop(0.55, c.oceanMid);\n  og.addColorStop(1, c.oceanDeep);\n  ctx.beginPath(); path({ type: 'Sphere' });\n  ctx.fillStyle = og; ctx.fill();\n\n  // Graticule\n  ctx.beginPath(); path(grat);\n  ctx.strokeStyle = c.graticule; ctx.lineWidth = 0.35; ctx.stroke();\n\n  if (world) {\n    // Land base\n    const countries = topojson.feature(world, world.objects.countries);\n    ctx.beginPath(); path(countries);\n    ctx.fillStyle = c.land; ctx.fill();\n\n    // Land sheen\n    ctx.beginPath(); path(countries);\n    const lg = ctx.createLinearGradient(W/2-R, H/2-R, rad.addColorStop(0.70, 'rgba(20,40,90,0.12)');\n  bandGrad.addColorStop(1,    'rgba(0,0,0,0)');\n  gctx.save(); gctx.translate(cx,cy); gctx.rotate(bandAngle);\n  gctx.fillStyle = bandGrad; gctx.fillRect(-gw,-gh*2,gw*2,gh*4);\n  gctx.restore();\n\n  // Stars\n  const allStars = [];\n  for (let i = 0; i < 3400; i++) {\n    const inBand = Math.random() < 0.52;\n    let x, y;\n    if (inBand) {\n      const t = (Math.random()-0.5)*Math.max(gw,gh)*1.9;\n      const perp = (Math.random()-0.5)*bandW*0.85;\n      x = cx + t*Math.cos(bandAngle) - perp*Math.sin(bandAngle);\n      y = cy + t*Math.sin(bandAngle) + perp*Math.cos(bandAngle);\n    } else { x = Math.random()*gw; y = Math.random()*gh; }\n    const size = Math.random()<0.035 ? Math.random()*1.8+1.1\n               : Math.random()<0.18  ? Math.random()*0.9+0.5\n               : Math.random()*0.45+0.18;\n    const hue = Math.random()<0.58?0:Math.random()<0.5?210:38;\n    allStars.push({ x, y, size, brightness:0.35+Math.random()*0.65, hue,\n      twinkle: Math.random()<0.16,\n      twinkleSpeed: 0.6+Math.random()*2.2,\n      twinklePhase: Math.random()*Math.PI*2 });\n  }\n  allStars.filter(s=>!s.twinkle).forEach(s => drawStar(gctx,s,0));\n\n  // Moon — upper left, crescent phase\n  const mx = gw*0.15, my = gh*0.14, mr = Math.min(gw,gh)*0.055;\n  drawMoon(gctx, mx, my, mr);\n\n  // Twinkle layer\n  twinkleStars = allStars.filter(s=>s.twinkle);\n  const tc = document.createElement('canvas');\n  tc.width=gw; tc.height=gh;\n  tc.style.cssText='position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity 1.1s ease;';\n  tc.id = 'twinkleLayer';\n  const old = document.getElementById('twinkleLayer');\n  if (old) old.remove();\n  document.body.insertBefore(tc, bgOverlay);\n  twinkleCtx = tc.getContext('2d');\n\n  function animateTwinkle(ts) {\n    if (!twinkleCtx) return;\n    const t = ts*0.001;\n    twinkleCtx.clearRect(0,0,gw,gh);\n    twinkleStars.forEach(s => drawStar(twinkleCtx, s, t));\n    requestAnimationFra
